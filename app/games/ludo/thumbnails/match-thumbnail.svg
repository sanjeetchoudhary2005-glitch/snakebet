<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matchBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="url(#matchBg)"/>
  
  <!-- VS Banner -->
  <rect x="100" y="150" width="600" height="200" rx="16" fill="none" stroke="#f5b342" stroke-width="2"/>
  
  <!-- Player 1 -->
  <circle cx="250" cy="250" r="60" fill="#e74c3c" opacity="0.3"/>
  <circle cx="250" cy="250" r="45" fill="#e74c3c" opacity="0.6"/>
  <circle cx="250" cy="250" r="30" fill="#e74c3c"/>
  <text x="250" y="260" font-size="24" fill="white" text-anchor="middle" font-family="Arial">💰</text>
  <text x="250" y="340" font-size="16" fill="#ccc" text-anchor="middle" font-family="Arial">Player 1</text>
  <text x="250" y="360" font-size="14" fill="#f5b342" text-anchor="middle" font-family="Arial">₹500</text>
  
  <!-- VS -->
  <text x="400" y="260" font-size="48" fill="#f5b342" text-anchor="middle" font-family="Arial" font-weight="bold" filter="url(#goldGlow)">VS</text>
  
  <!-- Player 2 -->
  <circle cx="550" cy="250" r="60" fill="#3498db" opacity="0.3"/>
  <circle cx="550" cy="250" r="45" fill="#3498db" opacity="0.6"/>
  <circle cx="550" cy="250" r="30" fill="#3498db"/>
  <text x="550" y="260" font-size="24" fill="white" text-anchor="middle" font-family="Arial">💰</text>
  <text x="550" y="340" font-size="16" fill="#ccc" text-anchor="middle" font-family="Arial">Player 2</text>
  <text x="550" y="360" font-size="14" fill="#f5b342" text-anchor="middle" font-family="Arial">₹500</text>
  
  <!-- Prize Pool -->
  <rect x="300" y="400" width="200" height="40" rx="20" fill="#f5b342" opacity="0.2"/>
  <text x="400" y="425" font-size="16" fill="#f5b342" text-anchor="middle" font-family="Arial">🏆 ₹1,000</text>
  
  <!-- Title -->
  <text x="400" y="60" font-size="32" fill="#f5b342" text-anchor="middle" font-family="Arial" font-weight="bold">⚔️ LUDO MATCH</text>
</svg>