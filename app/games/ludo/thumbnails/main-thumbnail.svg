<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b3d"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b3d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Glowing border -->
  <rect x="50" y="25" width="700" height="450" rx="20" fill="none" stroke="#f5b342" stroke-width="2" opacity="0.3"/>
  
  <!-- Ludo Board -->
  <g transform="translate(150, 50)">
    <!-- Board background -->
    <rect x="0" y="0" width="500" height="400" rx="12" fill="url(#boardGrad)" stroke="#f5b342" stroke-width="1"/>
    
    <!-- Red Home -->
    <rect x="10" y="10" width="180" height="180" rx="8" fill="#e74c3c" opacity="0.3"/>
    <circle cx="100" cy="100" r="50" fill="#e74c3c" opacity="0.6"/>
    <circle cx="100" cy="100" r="25" fill="#e74c3c"/>
    <text x="100" y="108" font-size="20" fill="white" text-anchor="middle" font-family="Arial">●</text>
    
    <!-- Green Home -->
    <rect x="310" y="10" width="180" height="180" rx="8" fill="#2ecc71" opacity="0.3"/>
    <circle cx="400" cy="100" r="50" fill="#2ecc71" opacity="0.6"/>
    <circle cx="400" cy="100" r="25" fill="#2ecc71"/>
    <text x="400" y="108" font-size="20" fill="white" text-anchor="middle" font-family="Arial">●</text>
    
    <!-- Yellow Home -->
    <rect x="10" y="210" width="180" height="180" rx="8" fill="#f1c40f" opacity="0.3"/>
    <circle cx="100" cy="300" r="50" fill="#f1c40f" opacity="0.6"/>
    <circle cx="100" cy="300" r="25" fill="#f1c40f"/>
    <text x="100" y="308" font-size="20" fill="white" text-anchor="middle" font-family="Arial">●</text>
    
    <!-- Blue Home -->
    <rect x="310" y="210" width="180" height="180" rx="8" fill="#3498db" opacity="0.3"/>
    <circle cx="400" cy="300" r="50" fill="#3498db" opacity="0.6"/>
    <circle cx="400" cy="300" r="25" fill="#3498db"/>
    <text x="400" y="308" font-size="20" fill="white" text-anchor="middle" font-family="Arial">●</text>
    
    <!-- Center cross -->
    <rect x="190" y="10" width="10" height="380" fill="#f5b342" opacity="0.3"/>
    <rect x="10" y="190" width="480" height="10" fill="#f5b342" opacity="0.3"/>
    
    <!-- Center star -->
    <polygon points="250,50 260,80 290,80 265,100 275,130 250,110 225,130 235,100 210,80 240,80" fill="#f5b342" opacity="0.8"/>
    
    <!-- Tokens on board -->
    <!-- Red token -->
    <circle cx="190" cy="190" r="12" fill="#e74c3c" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    <!-- Green token -->
    <circle cx="220" cy="190" r="12" fill="#2ecc71" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    <!-- Yellow token -->
    <circle cx="190" cy="220" r="12" fill="#f1c40f" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    <!-- Blue token -->
    <circle cx="220" cy="220" r="12" fill="#3498db" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Path dots -->
    <g fill="#f5b342" opacity="0.5">
      <circle cx="100" cy="10" r="4"/>
      <circle cx="100" cy="30" r="4"/>
      <circle cx="100" cy="50" r="4"/>
      <circle cx="100" cy="70" r="4"/>
      <circle cx="100" cy="90" r="4"/>
      <circle cx="100" cy="110" r="4"/>
      <circle cx="100" cy="130" r="4"/>
      <circle cx="100" cy="150" r="4"/>
      <circle cx="100" cy="170" r="4"/>
      <circle cx="100" cy="190" r="4"/>
    </g>
  </g>
  
  <!-- Text overlay -->
  <text x="400" y="475" font-size="48" fill="#f5b342" text-anchor="middle" font-family="Arial" font-weight="bold" filter="url(#glow)">
    🎲 LUDO
  </text>
</svg>