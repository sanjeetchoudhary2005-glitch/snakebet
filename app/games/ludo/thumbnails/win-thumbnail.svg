<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="winBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <filter id="winnerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="500" fill="url(#winBg)"/>
  
  <!-- Confetti particles -->
  <g opacity="0.6">
    <rect x="100" y="50" width="8" height="8" rx="2" fill="#e74c3c" transform="rotate(30, 100, 50)"/>
    <rect x="200" y="30" width="8" height="8" rx="2" fill="#f1c40f" transform="rotate(45, 200, 30)"/>
    <rect x="300" y="60" width="8" height="8" rx="2" fill="#2ecc71" transform="rotate(60, 300, 60)"/>
    <rect x="400" y="20" width="8" height="8" rx="2" fill="#3498db" transform="rotate(15, 400, 20)"/>
    <rect x="500" y="40" width="8" height="8" rx="2" fill="#e74c3c" transform="rotate(75, 500, 40)"/>
    <rect x="600" y="50" width="8" height="8" rx="2" fill="#f1c40f" transform="rotate(30, 600, 50)"/>
    <rect x="150" y="80" width="6" height="6" rx="2" fill="#9b59b6" transform="rotate(50, 150, 80)"/>
    <rect x="450" y="70" width="6" height="6" rx="2" fill="#e67e22" transform="rotate(40, 450, 70)"/>
  </g>
  
  <!-- Winner Circle -->
  <circle cx="400" cy="200" r="80" fill="#f5b342" opacity="0.1"/>
  <circle cx="400" cy="200" r="60" fill="#f5b342" opacity="0.2"/>
  <circle cx="400" cy="200" r="40" fill="#f5b342" opacity="0.4"/>
  <circle cx="400" cy="200" r="25" fill="#f5b342" filter="url(#winnerGlow)"/>
  
  <!-- Trophy -->
  <text x="400" y="215" font-size="40" text-anchor="middle">🏆</text>
  
  <!-- Win Text -->
  <text x="400" y="320" font-size="28" fill="#f5b342" text-anchor="middle" font-family="Arial" font-weight="bold" filter="url(#winnerGlow)">
    🎉 WINNER! 🎉
  </text>
  <text x="400" y="355" font-size="18" fill="#ccc" text-anchor="middle" font-family="Arial">
    Player 1 won ₹950
  </text>
  
  <!-- Payout Details -->
  <rect x="250" y="380" width="300" height="80" rx="12" fill="none" stroke="#f5b342" stroke-width="1" opacity="0.3"/>
  <text x="400" y="410" font-size="14" fill="#888" text-anchor="middle" font-family="Arial">
    Pool: ₹1,000 | Commission: ₹50 | Prize: ₹950
  </text>
</svg>